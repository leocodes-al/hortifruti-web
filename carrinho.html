<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HortiFruti Web</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="carrinho.css" />
    <link rel="stylesheet" href="responseCartNote.css" />
    <link rel="stylesheet" href="responseCartPhone.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header class="header">
      <img src="./img/logo.png" alt="Logo do Hortifruti" class="logo" />
      <h1>Finalizar Pedido</h1>
    </header>

    <!-- FORMULÁRIO DE DADOS DO CLIENTE -->
    <main class="main">
      <section class="formulario">
        <h2>Seus Dados</h2>
        <div class="dados">
          <input type="text" id="nome" placeholder="Digite seu nome completo" />
          <input type="text" id="endereco" placeholder="Digite seu endereço de entrega"/>
          <input type="number" id="telefone" placeholder="Digite seu telefone para contato"/>

          <select id="pagamento">
            <option value="">Selecione o pagamento</option>
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
          </select>
        </div>
      </section>
    </main>

          <!-- RESUMO DO PEDIDO -->
    <section class="resumo-pedido">
      <div>
        <h2>Resumo do Pedido</h2>
        <ul id="lista-carrinho"></ul>
        <p id="total-carrinho">Total: R$ 0.00</p>
        <button>Finalizar Pedido</button>
      </dv>
    </section>

    <script src="carrinho.js"></script>

  </body>
</html>
